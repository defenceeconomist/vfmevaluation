      - href: notes/index.qmd
        text: Notes
      - href: reports/index.qmd
        text: Reports
      - href: NOTES.md
        text: Release Notes
    right:
      - icon: github
        href: https://github.com/defenceeconomist/vfmevaluation
        aria-label: GitHub repository
  sidebar:
