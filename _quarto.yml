project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - NOTES.md
    - notes/index.qmd
    - notes/**/*.qmd
    - reports/index.qmd
    - reports/**/*.qmd
  pre-render:
    - python3 scripts/extract_link_graph.py --output data/notes_link_graph_payload.json --include-prefix notes/
  resources:
    - data/notes_link_graph_payload.json
    - references.bib
    - assets/**

website:
  title: "Value for Money Evaluation Knowledge Base"
  page-footer:
    center: "[defenceeconomist.github.io](https://defenceeconomist.github.io)"
